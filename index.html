<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Login</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>

<body>
  <div class="container">

    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
      </div>
      <h1>Secure Login</h1>
    </div>

    <div class="card" id="card">

      <!-- Success overlay (shown after login) -->
      <div class="success-overlay" id="successOverlay">
        <div class="check-circle">
          <svg viewBox="0 0 24 24">
            <polyline points="20 6 9 17 4 12" />
          </svg>
        </div>
        <div class="success-name" id="successName">Welcome back!</div>
        <div class="success-sub" id="successSub">Login notification sent to your inbox.</div>
      </div>

      <!-- Login form -->
      <div id="loginForm">
        <div class="alert" id="alertBox"></div>

        <div class="field">
          <label>Email Address</label>
          <div class="input-wrap">
            <input type="email" id="email" placeholder="aaa@gmail.com" autocomplete="email" />
            <svg viewBox="0 0 24 24">
              <rect x="2" y="4" width="20" height="16" rx="2" />
              <polyline points="2,4 12,13 22,4" />
            </svg>
          </div>
        </div>

        <div class="field">
          <label>Password</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
            <svg viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <button class="toggle-pw" onclick="togglePassword()" type="button" id="toggleBtn">
              <svg viewBox="0 0 24 24" id="eyeIcon">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <button class="btn-login" id="loginBtn" onclick="handleLogin()">
          Sign In
        </button>
      </div>

      <div class="hint">
        Test accounts &nbsp;→&nbsp;
        <strong>vstteddy220910@gmail.com</strong> / <strong>admin123</strong>
      </div>
    </div>

    <!-- JSON response panel -->
    <div class="json-panel" id="jsonPanel">
      <div class="json-panel-label">server response (json)</div>
      <pre id="jsonOutput"></pre>
    </div>

  </div>
</body>

</html>
